name: Publish
on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  check:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'chore(release):'))
    runs-on: ubuntu-24.04
    outputs:
      tag-exists: ${{ steps.check-tag.outputs.tag-exists }}
    steps:
      - uses: tuqulore/.github/setup@bfc3a44941a6d4499735fa48c913b51c15f9ca7b # main
        with:
          fetch-depth: 0

      - name: Check if tag already exists
        id: check-tag
        run: |
          VERSION=$(cat lerna.json | jq -r .version)
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}"; then
            echo "tag-exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag-exists=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check
    if: needs.check.outputs.tag-exists == 'false'
    runs-on: ubuntu-24.04
    steps:
      - uses: tuqulore/.github/setup@bfc3a44941a6d4499735fa48c913b51c15f9ca7b # main
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Publish to npm
        run: |
          VERSION=$(cat lerna.json | jq -r .version)
          if [[ "$VERSION" == *"-alpha."* ]]; then
            DIST_TAG="alpha"
          else
            DIST_TAG="latest"
          fi
          pnpm packages:publish --yes --dist-tag "${DIST_TAG}"
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Create release tag
        run: |
          git checkout main
          git pull origin main
          VERSION=$(cat lerna.json | jq -r .version)
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create alpha branch and bump version
        run: |
          git checkout main
          git pull origin main
          git checkout -B alpha
          pnpm packages:bump-version prerelease --preid alpha --yes --no-git-tag-version
          git commit --all --message "chore(alpha): v$(cat lerna.json | jq -r .version)"
          git push -f origin alpha

      - name: Create alpha pull request
        run: |
          VERSION=$(cat lerna.json | jq -r .version)
          gh pr create \
            --base main \
            --head alpha \
            --title "chore(alpha): v${VERSION}" \
            --body "Bump to alpha version v${VERSION}"
        env:
          GH_TOKEN: ${{ github.token }}
