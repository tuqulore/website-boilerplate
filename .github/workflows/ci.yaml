name: CI
on:
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ci:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: tuqulore/.github/setup@a6f839a51e2f61b2dbf6437a3a04b6b302365956 # main
      - run: pnpm lint
      - run: pnpm -r test
      - uses: tuqulore/.github/format@a6f839a51e2f61b2dbf6437a3a04b6b302365956 # main
